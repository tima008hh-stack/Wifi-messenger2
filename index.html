<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальный Чат со Звонками</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .fallback-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-2 sm:p-4 font-sans relative overflow-hidden fallback-bg">

    <!-- Задний фон (видео) -->
    <video id="bg-video" autoplay loop muted playsinline webkit-playsinline class="absolute inset-0 w-full h-full object-cover z-0">
        <source src="./bg.mp4" type="video/mp4">
        <source src="./2668.mp4" type="video/mp4">
        <source src="./2667.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 bg-slate-950/50 backdrop-blur-xl z-0"></div>

    <!-- Основное окно -->
    <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-2xl p-4 sm:p-6 rounded-3xl shadow-2xl border border-white/10 z-10 animate-fade-in relative">
        
        <!-- Окно входа -->
        <div id="login-block" class="space-y-5">
            <div class="text-center space-y-1">
                <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">
                    Сетевой Чат
                </h1>
                <p class="text-xs text-slate-300">Введи одинаковый номер комнаты с другом.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Твоё имя</label>
                    <input type="text" id="username" placeholder="Например: Иван" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Номер или название комнаты</label>
                    <input type="text" id="room" placeholder="Например: 777" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <button id="join-btn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-[0.98] font-semibold p-3.5 rounded-2xl transition shadow-lg shadow-blue-500/20 text-sm flex items-center justify-center gap-2">
                    <span>Войти в комнату</span>
                </button>
            </div>
        </div>

        <!-- Окно чата -->
        <div id="chat-block" class="hidden space-y-4 animate-fade-in">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-3">
                    <div id="my-avatar" class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-sm shadow-md">?</div>
                    <div>
                        <h2 class="font-bold text-sm text-white" id="room-display">Комната: -</h2>
                        <p class="text-xs text-slate-300" id="user-display">Вы: -</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button type="button" id="test-sound-btn" title="Проверить звук" class="p-1.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 transition active:scale-95 text-xs flex items-center gap-1">
                        🔊 <span class="hidden sm:inline text-[10px]">Тест</span>
                    </button>
                    <span class="text-[11px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-full font-medium flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> В сети
                    </span>
                </div>
            </div>

            <!-- Список участников с кнопками вызова -->
            <div>
                <p class="text-[11px] text-slate-300 mb-1.5 font-medium">Участники рядом (нажмите для звонка):</p>
                <div id="users-list" class="flex flex-wrap gap-1.5"></div>
            </div>

            <!-- Сообщения -->
            <div id="messages" class="h-72 bg-slate-950/40 rounded-2xl p-3 overflow-y-auto space-y-2 border border-white/5 text-sm scroll-smooth"></div>

            <!-- Форма отправки -->
            <form id="msg-form" class="flex gap-2 items-center">
                <input type="text" id="msg-input" placeholder="Напиши сообщение..." autocomplete="off" 
                    class="flex-1 bg-slate-950/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                
                <button type="button" id="mic-btn" 
                    class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 p-3 rounded-2xl transition border border-white/10 flex items-center justify-center shrink-0">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                    <span id="rec-timer" class="hidden text-xs font-bold text-red-400 ml-1">00:00</span>
                </button>

                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-500 active:scale-95 font-bold p-3 rounded-2xl transition shadow-md shadow-blue-600/20 flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </form>
        </div>

    </div>

    <!-- Модальное окно звонка -->
    <div id="call-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-2xl z-50 hidden flex flex-col items-center justify-between p-6 animate-fade-in">
        <div class="text-center pt-8 space-y-2">
            <h3 id="call-title" class="text-2xl font-bold text-white">Вызов...</h3>
            <p id="call-status" class="text-sm text-slate-400">Соединение...</p>
        </div>

        <!-- Контейнер с видео -->
        <div class="relative w-full max-w-lg aspect-video bg-slate-900 rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex items-center justify-center my-auto">
            <!-- Удаленное видео -->
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover"></video>
            <div id="remote-avatar-placeholder" class="absolute inset-0 flex items-center justify-center bg-slate-900">
                <div id="call-avatar" class="w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold shadow-2xl">?</div>
            </div>

            <!-- Локальное видео (Картинка в картинке) -->
            <div class="absolute bottom-3 right-3 w-28 h-36 bg-slate-950 rounded-2xl overflow-hidden border border-white/20 shadow-lg">
                <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover"></video>
            </div>
        </div>

        <!-- Панель управления звонком -->
        <div class="pb-8 flex items-center gap-4">
            <!-- Кнопки входящего вызова -->
            <div id="incoming-controls" class="hidden flex items-center gap-6">
                <button id="reject-btn" class="w-16 h-16 rounded-full bg-red-600 hover:bg-red-500 flex items-center justify-center text-white shadow-lg shadow-red-600/30 transition active:scale-95">
                    ❌
                </button>
                <button id="accept-btn" class="w-16 h-16 rounded-full bg-emerald-600 hover:bg-emerald-500 flex items-center justify-center text-white shadow-lg shadow-emerald-600/30 transition active:scale-95 text-2xl animate-bounce">
                    📞
                </button>
            </div>

            <!-- Кнопки во время звонка -->
            <div id="active-controls" class="flex items-center gap-4">
                <button id="toggle-mic-btn" class="p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 text-white border border-white/10 transition active:scale-95">
                    🎤
                </button>
                <button id="toggle-cam-btn" class="p-4 rounded-2xl bg-slate-800 hover:bg-slate-700 text-white border border-white/10 transition active:scale-95">
                    📹
                </button>
                <button id="end-call-btn" class="p-4 px-6 rounded-2xl bg-red-600 hover:bg-red-500 text-white font-bold transition shadow-lg shadow-red-600/30 active:scale-95">
                    Завершить
                </button>
            </div>
        </div>
    </div>

    <script>
        // Запуск видео фона
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('bg-video');
            if (video) { video.muted = true; video.play().catch(() => {}); }
        });

        // Цензура матов
        function censorText(text) {
            const badWordsPatterns = [
                /хуй[яиеюаммиыовлдезс]?/gi, /пизд[аеыоуияюаммивлдезс]?/gi,
                /еб[аеиоултщсйбммяюаммивлдезс]?/gi, /еб [а-я]+/gi,
                /бля[тдбвлдезс]?/gi, /сук[аиоеаммивлдезс]?/gi,
                /гандон[аммивлдезс]?/gi, /мудак[аммивлдезс]?/gi,
                /пидор[асиоеаммивлдезс]?/gi, /залуп[аеыоуияюаммивлдезс]?/gi, /чм[оауеы]?/gi
            ];
            let result = text;
            badWordsPatterns.forEach(pattern => {
                result = result.replace(pattern, (match) => {
                    return match.charAt(0) + '*'.repeat(match.length - 1);
                });
            });
            return result;
        }

        // Звуковые эффекты
        const notifyAudio = new Audio('./notification.mp3');

        function playNotificationSound() {
            notifyAudio.currentTime = 0;
            notifyAudio.play().catch(() => playFallbackSound(880, 0.2));
        }

        function playFallbackSound(freq = 587.33, duration = 0.2) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }

        // Гудок при звонке
        let ringInterval = null;
        function startRingtone() {
            stopRingtone();
            ringInterval = setInterval(() => {
                playFallbackSound(440, 0.4);
            }, 1200);
        }
        function stopRingtone() {
            if (ringInterval) {
                clearInterval(ringInterval);
                ringInterval = null;
            }
        }

        document.getElementById('test-sound-btn').onclick = () => playNotificationSound();

        let client, myName, myRoom, myId = Math.random().toString(36).substring(7);
        let users = new Map();

        const avatarColors = [
            'bg-red-500 text-white', 'bg-orange-500 text-white', 'bg-amber-500 text-white',
            'bg-emerald-500 text-white', 'bg-teal-500 text-white', 'bg-cyan-500 text-white',
            'bg-blue-500 text-white', 'bg-indigo-500 text-white', 'bg-violet-500 text-white',
            'bg-purple-500 text-white', 'bg-pink-500 text-white', 'bg-rose-500 text-white'
        ];

        function getColorForName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }

        // --- ЛОГИКА WEBRTC ЗВОНКОВ ---
        let peerConnection = null;
        let localStream = null;
        let currentCallTarget = null;
        let incomingOfferData = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        async function initMedia(video = true) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: video });
                document.getElementById('local-video').srcObject = localStream;
            } catch (err) {
                console.warn('Не удалось получить видеопоток, пробуем только аудио:', err);
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                document.getElementById('local-video').srcObject = null;
            }
        }

        function createPeerConnection(targetId) {
            peerConnection = new RTCPeerConnection(rtcConfig);

            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.ontrack = (e) => {
                const remoteVideo = document.getElementById('remote-video');
                document.getElementById('remote-avatar-placeholder').classList.add('hidden');
                remoteVideo.srcObject = e.streams[0];
            };

            peerConnection.onicecandidate = (e) => {
                if (e.candidate) {
                    client.publish('my_custom_room_' + myRoom, JSON.stringify({
                        type: 'ice-candidate',
                        from: myId,
                        target: targetId,
                        candidate: e.candidate
                    }));
                }
            };

            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    endCall();
                }
            };
        }

        // Начать вызов (Инициатор)
        async function startCall(targetId, targetName, withVideo = true) {
            currentCallTarget = targetId;
            showCallModal(targetName, 'Вызов пользователя...', true);
            startRingtone();

            await initMedia(withVideo);
            createPeerConnection(targetId);

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            client.publish('my_custom_room_' + myRoom, JSON.stringify({
                type: 'call-offer',
                from: myId,
                fromName: myName,
                target: targetId,
                sdp: offer
            }));
        }

        // Принять звонок
        document.getElementById('accept-btn').onclick = async () => {
            stopRingtone();
            document.getElementById('incoming-controls').classList.add('hidden');
            document.getElementById('active-controls').classList.remove('hidden');
            document.getElementById('call-status').textContent = 'Разговор...';

            await initMedia(true);
            createPeerConnection(incomingOfferData.from);

            await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingOfferData.sdp));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            client.publish('my_custom_room_' + myRoom, JSON.stringify({
                type: 'call-answer',
                from: myId,
                target: incomingOfferData.from,
                sdp: answer
            }));
        };

        // Отклонить звонок
        document.getElementById('reject-btn').onclick = () => {
            stopRingtone();
            if (incomingOfferData) {
                client.publish('my_custom_room_' + myRoom, JSON.stringify({
                    type: 'call-reject',
                    from: myId,
                    target: incomingOfferData.from
                }));
            }
            closeCallModal();
        };

        // Завершить звонок
        document.getElementById('end-call-btn').onclick = () => {
            if (currentCallTarget) {
                client.publish('my_custom_room_' + myRoom, JSON.stringify({
                    type: 'call-end',
                    from: myId,
                    target: currentCallTarget
                }));
            }
            endCall();
        };

        function endCall() {
            stopRingtone();
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            closeCallModal();
        }

        function showCallModal(name, statusText, isOutgoing = false) {
            const modal = document.getElementById('call-modal');
            document.getElementById('call-title').textContent = name;
            document.getElementById('call-status').textContent = statusText;

            const avatar = document.getElementById('call-avatar');
            avatar.textContent = name.charAt(0).toUpperCase();
            avatar.className = `w-24 h-24 rounded-full flex items-center justify-center text-3xl font-bold shadow-2xl ${getColorForName(name)}`;

            document.getElementById('remote-avatar-placeholder').classList.remove('hidden');

            if (isOutgoing) {
                document.getElementById('incoming-controls').classList.add('hidden');
                document.getElementById('active-controls').classList.remove('hidden');
            } else {
                document.getElementById('incoming-controls').classList.remove('hidden');
                document.getElementById('active-controls').classList.add('hidden');
            }

            modal.classList.remove('hidden');
        }

        function closeCallModal() {
            document.getElementById('call-modal').classList.add('hidden');
            currentCallTarget = null;
            incomingOfferData = null;
        }

        // Управление микрофоном и камерой во время звонка
        document.getElementById('toggle-mic-btn').onclick = () => {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    document.getElementById('toggle-mic-btn').textContent = audioTrack.enabled ? '🎤' : '🎙️❌';
                }
            }
        };

        document.getElementById('toggle-cam-btn').onclick = () => {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    document.getElementById('toggle-cam-btn').textContent = videoTrack.enabled ? '📹' : '📷❌';
                }
            }
        };

        // --- ВХОД В ЧАТ И MQTT LOGIC ---
        document.getElementById('join-btn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            myRoom = document.getElementById('room').value.trim();

            if (!myName || !myRoom) return alert('Заполни имя и номер комнаты!');

            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('chat-block').classList.remove('hidden');
            document.getElementById('room-display').textContent = 'Комната: ' + myRoom;
            document.getElementById('user-display').textContent = 'Вы: ' + myName;

            const myAvatar = document.getElementById('my-avatar');
            myAvatar.textContent = myName.charAt(0).toUpperCase();
            myAvatar.className = `w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-base shadow-lg ${getColorForName(myName)}`;

            client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            client.on('connect', () => {
                client.subscribe('my_custom_room_' + myRoom);
                setInterval(() => {
                    client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'ping', id: myId, name: myName }));
                    cleanUsers();
                }, 2000);
            });

            client.on('message', async (topic, msg) => {
                let data = JSON.parse(msg.toString());

                if (data.type === 'ping') {
                    users.set(data.id, { name: data.name, time: Date.now() });
                    renderUsers();
                }

                if (data.id !== myId) {
                    if (data.type === 'text') {
                        addMessage(data.name, data.text, false);
                        playNotificationSound();
                    }
                    if (data.type === 'audio') {
                        addAudioMessage(data.name, data.audio, false);
                        playNotificationSound();
                    }

                    // Обработка звонков (только если адресовано нам)
                    if (data.target === myId) {
                        if (data.type === 'call-offer') {
                            incomingOfferData = data;
                            currentCallTarget = data.from;
                            showCallModal(data.fromName, 'Входящий звонок...', false);
                            startRingtone();
                        }
                        if (data.type === 'call-answer' && peerConnection) {
                            stopRingtone();
                            document.getElementById('call-status').textContent = 'Разговор...';
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                        }
                        if (data.type === 'ice-candidate' && peerConnection) {
                            try {
                                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                            } catch (e) {}
                        }
                        if (data.type === 'call-reject') {
                            stopRingtone();
                            alert('Вызов отклонен');
                            endCall();
                        }
                        if (data.type === 'call-end') {
                            endCall();
                        }
                    }
                }
            });
        };

        // Отправка текста
        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            let input = document.getElementById('msg-input');
            let text = input.value.trim();
            if (!text) return;

            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'text', id: myId, name: myName, text: text }));
            addMessage(myName, text, true);
            input.value = '';
        };

        function addMessage(author, text, isMe) {
            let box = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `flex gap-2.5 items-end animate-slide-up ${isMe ? 'flex-row-reverse' : 'flex-row'}`;
            
            const firstLetter = author.charAt(0).toUpperCase();
            const avatarColor = getColorForName(author);
            const cleanText = censorText(text);

            div.innerHTML = `
                <div class="w-7 h-7 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 ${avatarColor} shadow-sm">${firstLetter}</div>
                <div class="max-w-[78%] space-y-0.5">
                    ${!isMe ? `<p class="text-[10px] text-slate-300 ml-1 font-medium">${escapeHTML(author)}</p>` : ''}
                    <div class="p-3 rounded-2xl text-xs break-words shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">
                        ${escapeHTML(cleanText)}
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Показ ГС в чате
        function addAudioMessage(author, audioBase64, isMe) {
            let box = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `flex gap-2.5 items-end animate-slide-up ${isMe ? 'flex-row-reverse' : 'flex-row'}`;

            const firstLetter = author.charAt(0).toUpperCase();
            const avatarColor = getColorForName(author);

            div.innerHTML = `
                <div class="w-7 h-7 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 ${avatarColor} shadow-sm">${firstLetter}</div>
                <div class="max-w-[78%] space-y-0.5">
                    ${!isMe ? `<p class="text-[10px] text-slate-300 ml-1 font-medium">${escapeHTML(author)}</p>` : ''}
                    <div class="p-2.5 rounded-2xl shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">
                        <audio controls class="h-8 w-48 rounded-lg max-w-full">
                            <source src="${audioBase64}" type="audio/webm">
                        </audio>
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Запись голосовых сообщений
        let mediaRecorder, audioChunks = [], isRecording = false, recTimerInterval, seconds = 0;
        const micBtn = document.getElementById('mic-btn');
        const recTimer = document.getElementById('rec-timer');

        micBtn.onclick = async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'audio', id: myId, name: myName, audio: base64Audio }));
                            addAudioMessage(myName, base64Audio, true);
                        };
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.replace('bg-slate-800', 'bg-red-600');
                    micBtn.classList.add('animate-pulse');
                    recTimer.classList.remove('hidden');

                    seconds = 0;
                    recTimer.textContent = '00:00';
                    recTimerInterval = setInterval(() => {
                        seconds++;
                        let m = String(Math.floor(seconds / 60)).padStart(2, '0');
                        let s = String(seconds % 60).padStart(2, '0');
                        recTimer.textContent = `${m}:${s}`;
                    }, 1000);

                } catch (err) {
                    alert('Не удалось получить доступ к микрофону!');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.replace('bg-red-600', 'bg-slate-800');
                micBtn.classList.remove('animate-pulse');
                recTimer.classList.add('hidden');
                clearInterval(recTimerInterval);
            }
        };

        function renderUsers() {
            let container = document.getElementById('users-list');
            container.innerHTML = '';
            users.forEach((u, id) => {
                let badge = document.createElement('div');
                const firstLetter = u.name.charAt(0).toUpperCase();
                const avatarColor = getColorForName(u.name);

                badge.className = 'flex items-center gap-1.5 bg-slate-950/60 border border-white/10 px-2.5 py-1 rounded-xl text-xs text-slate-200 animate-fade-in';
                
                let callBtns = '';
                if (id !== myId) {
                    callBtns = `
                        <button onclick="startCall('${id}', '${escapeHTML(u.name)}', true)" title="Видеозвонок" class="ml-1 text-xs hover:scale-125 transition">📹</button>
                        <button onclick="startCall('${id}', '${escapeHTML(u.name)}', false)" title="Аудиозвонок" class="text-xs hover:scale-125 transition">📞</button>
                    `;
                }

                badge.innerHTML = `
                    <span class="w-4 h-4 rounded-lg flex items-center justify-center text-[9px] font-bold ${avatarColor}">${firstLetter}</span>
                    <span>${escapeHTML(u.name)}</span>
                    ${callBtns}
                `;
                container.appendChild(badge);
            });
        }

        function cleanUsers() {
            let now = Date.now();
            users.forEach((u, id) => { if (now - u.time > 5000) users.delete(id); });
            renderUsers();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
