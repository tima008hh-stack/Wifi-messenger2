<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальный Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .loader-hide {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: scale(1.05);
        }

        .fallback-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 font-sans relative overflow-hidden fallback-bg">

    <video id="bg-video" autoplay loop muted playsinline webkit-playsinline preload="none" class="absolute inset-0 w-full h-full object-cover z-0">
        <source src="./bg.mp4" type="video/mp4">
        <source src="./2668.mp4" type="video/mp4">
        <source src="./2667.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 bg-slate-950/50 backdrop-blur-xl z-0"></div>

    <div id="preloader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-2xl transition-all duration-500">
        <div class="relative flex items-center justify-center mb-6">
            <div class="w-20 h-20 rounded-full border-4 border-blue-500/20 border-t-blue-500 animate-spin"></div>
            <div class="absolute w-10 h-10 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/40 animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
            </div>
        </div>
        <h2 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 tracking-wide">Сетевой Чат</h2>
        <p id="loader-status" class="text-xs text-slate-400 mt-2 font-medium tracking-wider uppercase animate-pulse">Загрузка модулей...</p>
    </div>

    <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-2xl p-6 rounded-3xl shadow-2xl border border-white/10 z-10 animate-fade-in relative">
        
        <div id="login-block" class="space-y-5">
            <div class="text-center space-y-1">
                <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">
                    Сетевой Чат
                </h1>
                <p class="text-xs text-slate-300">Введи одинаковый номер комнаты с другом.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Твоё имя</label>
                    <input type="text" id="username" placeholder="Например: Иван" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Номер или название комнаты</label>
                    <input type="text" id="room" placeholder="Например: 777" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <button id="join-btn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-[0.98] font-semibold p-3.5 rounded-2xl transition shadow-lg shadow-blue-500/20 text-sm flex items-center justify-center gap-2">
                    <span>Войти в комнату</span>
                </button>
            </div>
        </div>

        <div id="chat-block" class="hidden space-y-4 animate-fade-in">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-3">
                    <div id="my-avatar" class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-sm shadow-md">?</div>
                    <div>
                        <h2 class="font-bold text-sm text-white" id="room-display">Комната: -</h2>
                        <p class="text-xs text-slate-300" id="user-display">Вы: -</p>
                    </div>
                </div>
                <span class="text-[11px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-full font-medium flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> В сети
                </span>
            </div>

            <div class="flex justify-between items-center bg-slate-950/40 border border-white/5 px-3 py-2 rounded-2xl text-xs">
                <label class="flex items-center gap-2 cursor-pointer select-none text-slate-300">
                    <input type="checkbox" id="save-history-toggle" checked class="w-4 h-4 rounded accent-blue-600 cursor-pointer">
                    <span>Сохранять историю</span>
                </label>
                <button type="button" id="clear-chat-btn" class="text-rose-400 hover:text-rose-300 transition flex items-center gap-1 font-medium active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    <span>Очистить</span>
                </button>
            </div>

            <div>
                <p class="text-[11px] text-slate-300 mb-1.5 font-medium">Участники рядом:</p>
                <div id="users-list" class="flex flex-wrap gap-1.5"></div>
            </div>

            <div id="messages" class="h-72 bg-slate-950/40 rounded-2xl p-3 overflow-y-auto space-y-2 border border-white/5 text-sm scroll-smooth"></div>

            <form id="msg-form" class="flex gap-2 items-center">
                <input type="text" id="msg-input" placeholder="Напиши сообщение..." autocomplete="off" 
                    class="flex-1 bg-slate-950/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                
                <button type="button" id="mic-btn" 
                    class="bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 p-3 rounded-2xl transition border border-white/10 flex items-center justify-center shrink-0">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                    <span id="rec-timer" class="hidden text-xs font-bold text-red-400 ml-1">00:00</span>
                </button>

                <button type="submit" 
                    class="bg-blue-600 hover:bg-blue-500 active:scale-95 font-bold p-3 rounded-2xl transition shadow-md shadow-blue-600/20 flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </form>
        </div>

    </div>

    <script>
        // Прелоадер
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            const statusText = document.getElementById('loader-status');
            statusText.textContent = "Готово к подключению";
            setTimeout(() => { preloader.classList.add('loader-hide'); }, 600);
        });

        // Запуск видео
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('bg-video');
            if (video) { video.muted = true; video.play().catch(() => {}); }
        });

        // Цензура матов
        function censorText(text) {
            const badWordsPatterns = [
                /хуй[яиеюаммиыовлдезс]?/gi, /пизд[аеыоуияюаммивлдезс]?/gi,
                /еб[аеиоултщсйбммяюаммивлдезс]?/gi, /еб [а-я]+/gi,
                /бля[тдбвлдезс]?/gi, /сук[аиоеаммивлдезс]?/gi,
                /гандон[аммивлдезс]?/gi, /мудак[аммивлдезс]?/gi,
                /пидор[асиоеаммивлдезс]?/gi, /залуп[аеыоуияюаммивлдезс]?/gi, /чм[оауеы]?/gi
            ];
            let result = text;
            badWordsPatterns.forEach(pattern => {
                result = result.replace(pattern, (match) => {
                    return match.charAt(0) + '*'.repeat(match.length - 1);
                });
            });
            return result;
        }

        let client, myName, myRoom, myId = Math.random().toString(36).substring(7);
        let users = new Map();
        let chatHistory = [];

        const avatarColors = [
            'bg-red-500 text-white', 'bg-orange-500 text-white', 'bg-amber-500 text-white',
            'bg-emerald-500 text-white', 'bg-teal-500 text-white', 'bg-cyan-500 text-white',
            'bg-blue-500 text-white', 'bg-indigo-500 text-white', 'bg-violet-500 text-white',
            'bg-purple-500 text-white', 'bg-pink-500 text-white', 'bg-rose-500 text-white'
        ];

        function getColorForName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }

        // Загрузка сохранённой истории из памяти
        function loadHistory() {
            const savedToggle = localStorage.getItem('save_chat_enabled');
            if (savedToggle !== null) {
                document.getElementById('save-history-toggle').checked = (savedToggle === 'true');
            }

            if (!document.getElementById('save-history-toggle').checked) return;

            const saved = localStorage.getItem('chat_history_' + myRoom);
            if (saved) {
                try {
                    chatHistory = JSON.parse(saved);
                    chatHistory.forEach(item => {
                        if (item.type === 'text') addMessage(item.author, item.content, item.isMe, false);
                        if (item.type === 'audio') addAudioMessage(item.author, item.content, item.isMe, false);
                    });
                } catch (e) {}
            }
        }

        // Сохранение истории в память
        function saveMessageToHistory(item) {
            if (!document.getElementById('save-history-toggle').checked) return;
            chatHistory.push(item);
            // Храним максимум последние 50 сообщений
            if (chatHistory.length > 50) chatHistory.shift();
            localStorage.setItem('chat_history_' + myRoom, JSON.stringify(chatHistory));
        }

        // Переключатель галочки "Сохранять историю"
        document.getElementById('save-history-toggle').onchange = (e) => {
            localStorage.setItem('save_chat_enabled', e.target.checked);
            if (!e.target.checked) {
                localStorage.removeItem('chat_history_' + myRoom);
                chatHistory = [];
            }
        };

        // Кнопка очистки чата
        document.getElementById('clear-chat-btn').onclick = () => {
            document.getElementById('messages').innerHTML = '';
            chatHistory = [];
            localStorage.removeItem('chat_history_' + myRoom);
        };

        document.getElementById('join-btn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            myRoom = document.getElementById('room').value.trim();

            if (!myName || !myRoom) return alert('Заполни имя и номер комнаты!');

            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('chat-block').classList.remove('hidden');
            document.getElementById('room-display').textContent = 'Комната: ' + myRoom;
            document.getElementById('user-display').textContent = 'Вы: ' + myName;

            const myAvatar = document.getElementById('my-avatar');
            myAvatar.textContent = myName.charAt(0).toUpperCase();
            myAvatar.className = `w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-base shadow-lg ${getColorForName(myName)}`;

            loadHistory();

            client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            client.on('connect', () => {
                client.subscribe('my_custom_room_' + myRoom);
                setInterval(() => {
                    client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'ping', id: myId, name: myName }));
                    cleanUsers();
                }, 2000);
            });

            client.on('message', (topic, msg) => {
                let data = JSON.parse(msg.toString());
                if (data.type === 'ping') {
                    users.set(data.id, { name: data.name, time: Date.now() });
                    renderUsers();
                }
                if (data.id !== myId) {
                    if (data.type === 'text') addMessage(data.name, data.text, false, true);
                    if (data.type === 'audio') addAudioMessage(data.name, data.audio, false, true);
                }
            });
        };

        // Отправка текста
        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            let input = document.getElementById('msg-input');
            let text = input.value.trim();
            if (!text) return;

            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'text', id: myId, name: myName, text: text }));
            addMessage(myName, text, true, true);
            input.value = '';
        };

        function addMessage(author, text, isMe, shouldSave = true) {
            let box = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `flex gap-2.5 items-end animate-slide-up ${isMe ? 'flex-row-reverse' : 'flex-row'}`;
            
            const firstLetter = author.charAt(0).toUpperCase();
            const avatarColor = getColorForName(author);
            const cleanText = censorText(text);

            div.innerHTML = `
                <div class="w-7 h-7 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 ${avatarColor} shadow-sm">${firstLetter}</div>
                <div class="max-w-[78%] space-y-0.5">
                    ${!isMe ? `<p class="text-[10px] text-slate-300 ml-1 font-medium">${escapeHTML(author)}</p>` : ''}
                    <div class="p-3 rounded-2xl text-xs break-words shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">
                        ${escapeHTML(cleanText)}
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if (shouldSave) {
                saveMessageToHistory({ type: 'text', author, content: text, isMe });
            }
        }

        // Показ ГС
        function addAudioMessage(author, audioBase64, isMe, shouldSave = true) {
            let box = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `flex gap-2.5 items-end animate-slide-up ${isMe ? 'flex-row-reverse' : 'flex-row'}`;

            const firstLetter = author.charAt(0).toUpperCase();
            const avatarColor = getColorForName(author);

            div.innerHTML = `
                <div class="w-7 h-7 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 ${avatarColor} shadow-sm">${firstLetter}</div>
                <div class="max-w-[78%] space-y-0.5">
                    ${!isMe ? `<p class="text-[10px] text-slate-300 ml-1 font-medium">${escapeHTML(author)}</p>` : ''}
                    <div class="p-2.5 rounded-2xl shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">
                        <audio controls class="h-8 w-48 rounded-lg max-w-full">
                            <source src="${audioBase64}" type="audio/webm">
                        </audio>
                    </div>
                </div>
            `;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if (shouldSave) {
                saveMessageToHistory({ type: 'audio', author, content: audioBase64, isMe });
            }
        }

        // 🎙️ ЛОГИКА ЗАПИСИ ГС
        let mediaRecorder, audioChunks = [], isRecording = false, recTimerInterval, seconds = 0;
        const micBtn = document.getElementById('mic-btn');
        const recTimer = document.getElementById('rec-timer');

        micBtn.onclick = async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'audio', id: myId, name: myName, audio: base64Audio }));
                            addAudioMessage(myName, base64Audio, true, true);
                        };
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.replace('bg-slate-800', 'bg-red-600');
                    micBtn.classList.add('animate-pulse');
                    recTimer.classLis
