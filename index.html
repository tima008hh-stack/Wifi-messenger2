<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локальный Чат</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-slide-up { animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .fallback-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0f172a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 font-sans relative overflow-hidden fallback-bg">

    <video id="bg-video" autoplay loop muted playsinline webkit-playsinline class="absolute inset-0 w-full h-full object-cover z-0">
        <source src="./bg.mp4" type="video/mp4">
        <source src="./2668.mp4" type="video/mp4">
        <source src="./2667.mp4" type="video/mp4">
    </video>

    <div class="absolute inset-0 bg-slate-950/50 backdrop-blur-xl z-0"></div>

    <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-2xl p-6 rounded-3xl shadow-2xl border border-white/10 z-10 animate-fade-in relative">
        
        <div id="login-block" class="space-y-5">
            <div class="text-center space-y-1">
                <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300">
                    Сетевой Чат
                </h1>
                <p class="text-xs text-slate-300">Введи одинаковый номер комнаты с другом.</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Твоё имя</label>
                    <input type="text" id="username" placeholder="Например: Иван" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <div>
                    <label class="text-xs font-medium text-slate-300 ml-1">Номер или название комнаты</label>
                    <input type="text" id="room" placeholder="Например: 777" 
                        class="w-full bg-slate-950/60 border border-white/10 rounded-2xl p-3.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all mt-1">
                </div>

                <button id="join-btn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 active:scale-[0.98] font-semibold p-3.5 rounded-2xl transition shadow-lg shadow-blue-500/20 text-sm flex items-center justify-center gap-2">
                    <span>Войти в комнату</span>
                </button>
            </div>
        </div>

        <div id="chat-block" class="hidden space-y-4 animate-fade-in">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <div class="flex items-center gap-3">
                    <div id="my-avatar" class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-sm shadow-md">?</div>
                    <div>
                        <h2 class="font-bold text-sm text-white" id="room-display">Комната: -</h2>
                        <p class="text-xs text-slate-300" id="user-display">Вы: -</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button type="button" id="test-sound-btn" title="Проверить звук" class="p-1.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 transition active:scale-95 text-xs flex items-center gap-1">
                        🔊 <span class="hidden sm:inline text-[10px]">Тест</span>
                    </button>
                    <span class="text-[11px] bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2.5 py-1 rounded-full font-medium flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> В сети
                    </span>
                </div>
            </div>

            <div>
                <p class="text-[11px] text-slate-300 mb-1.5 font-medium">Участники рядом:</p>
                <div id="users-list" class="flex flex-wrap gap-1.5"></div>
            </div>

            <div id="messages" class="h-72 bg-slate-950/40 rounded-2xl p-3 overflow-y-auto space-y-2 border border-white/5 text-sm scroll-smooth"></div>

            <form id="msg-form" class="flex gap-1.5 items-center">
                <!-- Скрытый инпут для выбора фото -->
                <input type="file" id="image-input" accept="image/*" class="hidden">

                <!-- Кнопка скрепки (отправка фото) -->
                <button type="button" id="attach-btn" title="Отправить фото"
                    class="bg-slate-900/80 hover:bg-slate-800 active:scale-95 text-slate-300 hover:text-blue-400 p-2.5 rounded-2xl transition border border-white/10 flex items-center justify-center shrink-0 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 -rotate-45" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>

                <input type="text" id="msg-input" placeholder="Напиши сообщение..." autocomplete="off" 
                    class="min-w-0 flex-1 bg-slate-950/60 border border-white/10 rounded-2xl px-3.5 py-3 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                
                <!-- Кнопка микрофона -->
                <button type="button" id="mic-btn" title="Голосовое сообщение"
                    class="bg-slate-900/80 hover:bg-slate-800 active:scale-95 text-slate-300 hover:text-red-400 p-2.5 rounded-2xl transition border border-white/10 flex items-center justify-center shrink-0 shadow-sm">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                    <span id="rec-timer" class="hidden text-xs font-bold text-red-400 ml-1">00:00</span>
                </button>

                <!-- Кнопка отправки текста -->
                <button type="submit" title="Отправить"
                    class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white p-2.5 rounded-2xl transition shadow-md shadow-blue-600/20 flex items-center justify-center shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </form>
        </div>

    </div>

    <!-- Модальное окно для просмотра фото в полный размер -->
    <div id="image-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4 cursor-pointer" onclick="closeImageModal()">
        <img id="modal-img" class="max-w-full max-h-[90vh] rounded-2xl shadow-2xl border border-white/10 object-contain">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('bg-video');
            if (video) { video.muted = true; video.play().catch(() => {}); }
        });

        function censorText(text) {
            const badWordsPatterns = [
                /хуй[яиеюаммиыовлдезс]?/gi, /пизд[аеыоуияюаммивлдезс]?/gi,
                /еб[аеиоултщсйбммяюаммивлдезс]?/gi, /еб [а-я]+/gi,
                /бля[тдбвлдезс]?/gi, /сук[аиоеаммивлдезс]?/gi,
                /гандон[аммивлдезс]?/gi, /мудак[аммивлдезс]?/gi,
                /пидор[асиоеаммивлдезс]?/gi, /залуп[аеыоуияюаммивлдезс]?/gi, /чм[оауеы]?/gi
            ];
            let result = text;
            badWordsPatterns.forEach(pattern => {
                result = result.replace(pattern, (match) => match.charAt(0) + '*'.repeat(match.length - 1));
            });
            return result;
        }

        const notifyAudio = new Audio('./notification.mp3');

        function playNotificationSound() {
            notifyAudio.currentTime = 0;
            notifyAudio.play().catch(() => playFallbackSound());
        }

        function playFallbackSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.08);

                gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            } catch (e) {}
        }

        document.getElementById('test-sound-btn').onclick = () => playNotificationSound();

        let client, myName, myRoom, myId = Math.random().toString(36).substring(7);
        let users = new Map();

        const avatarColors = [
            'bg-red-500 text-white', 'bg-orange-500 text-white', 'bg-amber-500 text-white',
            'bg-emerald-500 text-white', 'bg-teal-500 text-white', 'bg-cyan-500 text-white',
            'bg-blue-500 text-white', 'bg-indigo-500 text-white', 'bg-violet-500 text-white',
            'bg-purple-500 text-white', 'bg-pink-500 text-white', 'bg-rose-500 text-white'
        ];

        function getColorForName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return avatarColors[Math.abs(hash) % avatarColors.length];
        }

        document.getElementById('join-btn').onclick = () => {
            myName = document.getElementById('username').value.trim();
            myRoom = document.getElementById('room').value.trim();

            if (!myName || !myRoom) return alert('Заполни имя и номер комнаты!');

            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('chat-block').classList.remove('hidden');
            document.getElementById('room-display').textContent = 'Комната: ' + myRoom;
            document.getElementById('user-display').textContent = 'Вы: ' + myName;

            const myAvatar = document.getElementById('my-avatar');
            myAvatar.textContent = myName.charAt(0).toUpperCase();
            myAvatar.className = `w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-base shadow-lg ${getColorForName(myName)}`;

            loadHistory();

            client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

            client.on('connect', () => {
                client.subscribe('my_custom_room_' + myRoom);
                setInterval(() => {
                    client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'ping', id: myId, name: myName }));
                    cleanUsers();
                }, 2000);
            });

            client.on('message', (topic, msg) => {
                let data = JSON.parse(msg.toString());
                if (data.type === 'ping') {
                    users.set(data.id, { name: data.name, time: Date.now() });
                    renderUsers();
                }
                if (data.id !== myId) {
                    if (data.type === 'text') {
                        saveAndAddMessage(data.name, data.text, false, 'text');
                        playNotificationSound();
                    }
                    if (data.type === 'audio') {
                        saveAndAddMessage(data.name, data.audio, false, 'audio');
                        playNotificationSound();
                    }
                    if (data.type === 'image') {
                        saveAndAddMessage(data.name, data.image, false, 'image');
                        playNotificationSound();
                    }
                }
            });
        };

        function getStorageKey() {
            return 'chat_history_room_' + myRoom;
        }

        function loadHistory() {
            let box = document.getElementById('messages');
            box.innerHTML = '';
            try {
                let rawData = localStorage.getItem(getStorageKey());
                if (!rawData) return;
                let data = JSON.parse(rawData);
                
                if (Date.now() - data.timestamp > 24 * 60 * 60 * 1000) {
                    localStorage.removeItem(getStorageKey());
                    return;
                }

                data.messages.forEach(m => {
                    renderMessageDOM(m.author, m.content, m.isMe, m.type, false);
                });
            } catch (e) {}
        }

        function saveMessageToStorage(author, content, isMe, type) {
            try {
                let key = getStorageKey();
                let rawData = localStorage.getItem(key);
                let chatData = rawData ? JSON.parse(rawData) : { timestamp: Date.now(), messages: [] };
                
                chatData.messages.push({ author, content, isMe, type });
                if (chatData.messages.length > 150) chatData.messages.shift();

                localStorage.setItem(key, JSON.stringify(chatData));
            } catch (e) {}
        }

        function saveAndAddMessage(author, content, isMe, type) {
            saveMessageToStorage(author, content, isMe, type);
            renderMessageDOM(author, content, isMe, type, true);
        }

        document.getElementById('msg-form').onsubmit = (e) => {
            e.preventDefault();
            let input = document.getElementById('msg-input');
            let text = input.value.trim();
            if (!text) return;

            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'text', id: myId, name: myName, text: text }));
            saveAndAddMessage(myName, text, true, 'text');
            input.value = '';
        };

        const attachBtn = document.getElementById('attach-btn');
        const imageInput = document.getElementById('image-input');

        attachBtn.onclick = () => imageInput.click();

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.75);

                    client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'image', id: myId, name: myName, image: compressedBase64 }));
                    saveAndAddMessage(myName, compressedBase64, true, 'image');
                    imageInput.value = '';
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        function renderMessageDOM(author, content, isMe, type, scrollDown = true) {
            let box = document.getElementById('messages');
            let div = document.createElement('div');
            div.className = `flex gap-2.5 items-end animate-slide-up ${isMe ? 'flex-row-reverse' : 'flex-row'}`;
            
            const firstLetter = author.charAt(0).toUpperCase();
            const avatarColor = getColorForName(author);

            let innerHTMLContent = '';

            if (type === 'text') {
                const cleanText = censorText(content);
                innerHTMLContent = `<div class="p-3 rounded-2xl text-xs break-words shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">${escapeHTML(cleanText)}</div>`;
            } else if (type === 'audio') {
                innerHTMLContent = `
                    <div class="p-2.5 rounded-2xl shadow-md ${isMe ? 'bg-blue-600 text-white rounded-br-xs' : 'bg-slate-800/80 border border-white/10 text-slate-100 rounded-bl-xs'}">
                        <audio controls class="h-8 w-48 rounded-lg max-w-full">
                            <source src="${content}" type="audio/webm">
                        </audio>
                    </div>`;
            } else if (type === 'image') {
                innerHTMLContent = `
                    <div class="p-1.5 rounded-2xl shadow-md bg-slate-900/80 border border-white/10 overflow-hidden">
                        <img src="${content}" onclick="openImageModal('${content}')" class="w-44 h-auto rounded-xl cursor-pointer hover:opacity-95 transition object-cover">
                    </div>`;
            }

            div.innerHTML = `
                <div class="w-7 h-7 rounded-xl flex items-center justify-center text-xs font-bold shrink-0 ${avatarColor} shadow-sm">${firstLetter}</div>
                <div class="max-w-[78%] space-y-0.5">
                    ${!isMe ? `<p class="text-[10px] text-slate-300 ml-1 font-medium">${escapeHTML(author)}</p>` : ''}
                    ${innerHTMLContent}
                </div>
            `;
            box.appendChild(div);
            if (scrollDown) box.scrollTop = box.scrollHeight;
        }

        function openImageModal(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
            document.getElementById('image-modal').classList.add('flex');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
            document.getElementById('image-modal').classList.remove('flex');
        }

        let mediaRecorder, audioChunks = [], isRecording = false, recTimerInterval, seconds = 0;
        const micBtn = document.getElementById('mic-btn');
        const recTimer = document.getElementById('rec-timer');
        const micIcon = document.getElementById('mic-icon');

        micBtn.onclick = async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            client.publish('my_custom_room_' + myRoom, JSON.stringify({ type: 'audio', id: myId, name: myName, audio: base64Audio }));
                            saveAndAddMessage(myName, base64Audio, true, 'audio');
                        };
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.replace('bg-slate-900/80', 'bg-red-600');
                    micBtn.classList.add('animate-pulse');
                    micIcon.classList.add('hidden');
                    recTimer.classList.remove('hidden');

                    seconds = 0;
                    recTimer.textContent = '00:00';
                    recTimerInterval = setInterval(() => {
                        seconds++;
                        let m = String(Math.floor(seconds / 60)).padStart(2, '0');
                        let s = String(seconds % 60).padStart(2, '0');
                        recTimer.textContent = `${m}:${s}`;
                    }, 1000);

                } catch (err) {
                    alert('Не удалось получить доступ к микрофону!');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.replace('bg-red-600', 'bg-slate-900/80');
                micBtn.classList.remove('animate-pulse');
                recTimer.classList.add('hidden');
                micIcon.classList.remove('hidden');
                clearInterval(recTimerInterval);
            }
        };

        function renderUsers() {
            let container = document.getElementById('users-list');
            container.innerHTML = '';
            users.forEach(u => {
                let badge = document.createElement('div');
                const firstLetter = u.name.charAt(0).toUpperCase();
                const avatarColor = getColorForName(u.name);

                badge.className = 'flex items-center gap-1.5 bg-slate-950/60 border border-white/10 px-2.5 py-1 rounded-xl text-xs text-slate-200 animate-fade-in';
                badge.innerHTML = `<span class="w-4 h-4 rounded-lg flex items-center justify-center text-[9px] font-bold ${avatarColor}">${firstLetter}</span><span>${escapeHTML(u.name)}</span>`;
                container.appendChild(badge);
            });
        }

        function cleanUsers() {
            let now = Date.now();
            users.forEach((u, id) => { if (now - u.time > 5000) users.delete(id); });
            renderUsers();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
